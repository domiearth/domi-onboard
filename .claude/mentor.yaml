# mentor framework config — generated by foreman bulk /mentor:init (claude-workbench mentor 0.3.0)
schema_version: 1
mode: basic
paths:
  spec: doc/SPEC.md
  task_fallback: doc/task.md
id_patterns:
  task: "task-{seq:03d}"
agent_behavior:
  bootstrap_docs:
    - doc/SPEC.md
  require_issue_context: false
  auto_retrospective: false
  require_adr_on_decision: false
templates:
  source: builtin
integration:
  kanban:
    enabled: auto
    sync_issue_to_task: true
    block_done_if_issue_incomplete: false
  memory:
    enabled: auto
    save_sprint_retro: true
    save_adr: true
  notify:
    enabled: auto
    notify_sprint_end: true
    notify_epic_done: true
